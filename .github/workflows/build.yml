name: 打包快递单转PDF

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:  # 手动触发，点一下就能跑

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) 拉代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2) 装 Python
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 装依赖
      - name: 安装依赖
        run: |
          pip install PySide6 qdarkstyle pyinstaller

      # 4) 打包
      - name: 打包成 exe
        run: |
          pyinstaller --onefile --windowed --name "快递单转PDF" --noconfirm main.py

      # 5) 上传产物
      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: 快递单转PDF-${{ github.ref_name }}
          path: dist/快递单转PDF.exe
          if-no-files-found: error
